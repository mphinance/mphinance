services:
  vaultguard:
    build: .
    container_name: vaultguard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003" # REST API — internal only
      - "127.0.0.1:8004:8004" # MCP SSE — internal only
    environment:
      - VAULTGUARD_API_KEY=${VAULTGUARD_API_KEY}
      - FIREBASE_CREDENTIALS=/app/service_account.json
      - VAULTGUARD_PORT=8003
      - VAULTGUARD_MCP_PORT=8004
    volumes:
      - ./service_account.json:/app/service_account.json:ro
