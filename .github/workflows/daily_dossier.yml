name: Daily Alpha Dossier

on:
  schedule:
    # Mon-Fri at 5:00AM CST (11:00 UTC)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Alpha Dossier
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TICKERTRACE_API_BASE: ${{ secrets.TICKERTRACE_API_BASE }}
        run: python -m dossier.generate --no-pdf

      - name: Commit & Push
        run: |
          git config --local user.email "ghost@mphinance.com"
          git config --local user.name "Ghost Alpha Pipeline"
          git add docs/ dossier/persistence/data/
          git diff --staged --quiet || git commit -m "📊 Alpha Dossier $(date +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
