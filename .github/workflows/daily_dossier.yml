name: Daily Alpha Dossier

on:
  schedule:
    # Mon-Fri at 4:30PM ET (21:30 UTC)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Alpha Dossier
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TICKERTRACE_API_BASE: ${{ secrets.TICKERTRACE_API_BASE }}
        run: python -m dossier.generate --no-pdf

      - name: Commit & Push
        run: |
          git config --local user.email "ghost@mphinance.com"
          git config --local user.name "Ghost Alpha Pipeline"
          git add docs/ dossier/persistence/data/
          git diff --staged --quiet || git commit -m "📊 Alpha Dossier $(date +%Y-%m-%d)"
          git push
