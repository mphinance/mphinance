name: Watchlist Deep Dive

on:
  push:
    branches: [main]
    paths:
      - 'watchlist.txt'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Space-separated tickers (leave blank to use watchlist.txt)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy httpx feedparser jinja2 tradingview-ta google-generativeai

      - name: Generate deep dives
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            python -m dossier.watchlist_dive ${{ github.event.inputs.tickers }}
          else
            python -m dossier.watchlist_dive
          fi

      - name: Commit and push
        run: |
          git config user.name "ghost-bot"
          git config user.email "ghost@mphinance.com"
          git add docs/watchlist/
          git diff --cached --quiet || git commit -m "📝 Watchlist deep dives updated"
          git push
