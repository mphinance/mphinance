<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Matrix — Alpha.HUD Widget</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #050508;
            --panel: rgba(14, 14, 22, 0.95);
            --border: #2a2a35;
            --green: #00ff41;
            --red: #f0b400;
            --blue: #00f3ff;
            --amber: #ffb000;
            --purple: #a855f7;
            --text: #e0e0e0;
            --dim: #aaa;
            --muted: #777
        }

        body {
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            background-size: 100% 2px, 3px 100%
        }

        .widget {
            max-width: 700px;
            margin: 16px auto;
            border: 1px solid var(--border);
            background: var(--panel);
            overflow: hidden
        }

        .header {
            background: rgba(20, 20, 20, 0.9);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .header .title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--dim);
            letter-spacing: 0.15em;
            text-transform: uppercase
        }

        .header .ticker {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.08em
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid #1a1a1a
        }

        .col {
            padding: 16px
        }

        .col:first-child {
            border-right: 1px solid #1a1a1a
        }

        .col-title {
            font-size: 9px;
            color: var(--blue);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1a1a1a
        }

        .col-title.amber {
            color: var(--amber)
        }

        .col-title.purple {
            color: var(--purple)
        }

        .col-title.cyan {
            color: #22d3ee
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            font-size: 11px
        }

        .row .label {
            color: var(--muted)
        }

        .row .val {
            font-weight: 700
        }

        .row.sep {
            border-top: 1px solid #1a1a1a;
            padding-top: 6px;
            margin-top: 4px
        }

        .up {
            color: var(--green)
        }

        .down {
            color: var(--red)
        }

        .neutral {
            color: var(--dim)
        }

        .pivot-r {
            border-left: 2px solid rgba(240, 180, 0, 0.4);
            padding-left: 8px
        }

        .pivot-s {
            border-left: 2px solid rgba(0, 255, 65, 0.3);
            padding-left: 8px
        }

        .pivot-pp {
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            padding-left: 8px;
            background: rgba(255, 255, 255, 0.03);
            margin: 2px -4px;
            padding: 4px 8px;
            font-weight: 700
        }

        .osc-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            border-bottom: 1px solid #1a1a1a
        }

        .osc-cell {
            background: rgba(15, 15, 15, 0.8);
            text-align: center;
            padding: 10px 4px
        }

        .osc-cell .osc-label {
            font-size: 8px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em
        }

        .osc-cell .osc-val {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-top: 2px
        }

        .vol-bar-outer {
            width: 100%;
            background: #1a1a1a;
            height: 5px;
            border-radius: 3px;
            margin-top: 4px
        }

        .vol-bar-inner {
            height: 100%;
            border-radius: 3px;
            background: #22d3ee;
            transition: width 0.5s ease
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid #1a1a1a
        }

        .footer .brand {
            font-size: 8px;
            color: #333;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none
        }

        .footer .brand:hover {
            color: var(--purple)
        }

        .embed-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            padding: 3px 10px;
            border: 1px solid #333;
            color: #555;
            background: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 2px;
            transition: all 0.2s
        }

        .embed-btn:hover {
            color: var(--blue);
            border-color: var(--blue)
        }

        .embed-btn.copied {
            color: #22c55e;
            border-color: #22c55e
        }

        @media(max-width:480px) {
            .grid {
                grid-template-columns: 1fr
            }

            .col:first-child {
                border-right: none;
                border-bottom: 1px solid #1a1a1a
            }

            .osc-row {
                grid-template-columns: repeat(2, 1fr)
            }
        }
    
        .share-screenshot-btn{font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 10px;border:1px solid #333;color:#555;background:none;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;border-radius:2px;transition:all 0.2s;display:inline-flex;align-items:center;gap:4px}
        .share-screenshot-btn:hover{color:#a855f7;border-color:#a855f7}
        .share-screenshot-btn.capturing{color:#ffb000;border-color:#ffb000}
        .share-screenshot-btn.done{color:#22c55e;border-color:#22c55e}
    </style>
</head>

<body>
    <div class="widget" id="tech-widget">
        <div class="header">
            <span class="title">Technical.Matrix // Auto-Calc</span>
            <span class="ticker" id="w-ticker">---</span>
        </div>
        <div class="grid" id="ma-pivot-grid">
            <div class="col" id="ma-col">
                <div class="col-title">Moving Averages</div>
                <div id="ma-rows">Loading...</div>
            </div>
            <div class="col" id="pivot-col">
                <div class="col-title amber">Pivot Points</div>
                <div id="pivot-rows">Loading...</div>
            </div>
        </div>
        <div class="grid">
            <div class="col" id="fib-col">
                <div class="col-title purple">Fibonacci (1Y)</div>
                <div id="fib-rows">Loading...</div>
            </div>
            <div class="col" id="vol-col">
                <div class="col-title cyan">Volume Profile</div>
                <div id="vol-rows">Loading...</div>
            </div>
        </div>
        <div class="osc-row" id="osc-row">
            <div class="osc-cell">
                <div class="osc-label">ADX</div>
                <div class="osc-val" id="w-adx">--</div>
            </div>
            <div class="osc-cell">
                <div class="osc-label">MACD Hist</div>
                <div class="osc-val" id="w-macd">--</div>
            </div>
            <div class="osc-cell">
                <div class="osc-label">Stoch %K</div>
                <div class="osc-val" id="w-stoch">--</div>
            </div>
            <div class="osc-cell">
                <div class="osc-label">HV (30D)</div>
                <div class="osc-val" id="w-hv30">--</div>
            </div>
        </div>
        <div class="footer">
            <a href="https://mphinance.github.io/mphinance/" class="brand" target="_blank">Alpha.HUD // mphinance</a>
            <button class="embed-btn" onclick="copyEmbed()">&lt;/&gt; Embed</button>
            <button class="share-screenshot-btn" onclick="(function(btn){var t=(new URLSearchParams(location.search).get('t')||'TICKER');shareWidgetScreenshot('.widget',t,'technicals',btn);})(this)">📷 Share</button>
        </div>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            let ticker = params.get('t') || params.get('ticker') || 'TSLA';

            const base = window.location.href.includes('github.io')
                ? `https://mphinance.github.io/mphinance/ticker/${ticker}/latest.json`
                : `../ticker/${ticker}/latest.json`;

            fetch(base + '?t=' + Date.now())
                .then(r => r.json())
                .then(d => render(d))
                .catch(() => { document.getElementById('w-ticker').textContent = ticker + ' (no data)'; });

            function render(d) {
                document.getElementById('w-ticker').textContent = d.ticker;
                const price = d.currentPrice || 0;
                const ta = d.technical_analysis || {};
                const ema = ta.ema || {};
                const trend = ta.trend || {};
                const piv = ta.pivots || {};
                const fib = ta.fibonacci || {};
                const vol = ta.volume || {};
                const osc = ta.oscillators || {};

                // MAs
                const emas = [['EMA 8', ema['8']], ['EMA 21', ema['21']], ['EMA 34', ema['34']], ['EMA 55', ema['55']], ['EMA 89', ema['89']]];
                const smas = [['SMA 50 (Inst)', trend.sma_50], ['SMA 200 (Trend)', trend.sma_200]];
                let maHtml = emas.map(([l, v]) => {
                    const cls = price > parseFloat(v) ? 'up' : 'down';
                    return `<div class="row"><span class="label">${l}</span><span class="val ${cls}">$${v}</span></div>`;
                }).join('');
                maHtml += smas.map(([l, v]) => {
                    const cls = price > parseFloat(v) ? 'up' : 'down';
                    return `<div class="row sep"><span class="label">${l}</span><span class="val ${cls}">$${v}</span></div>`;
                }).join('');
                document.getElementById('ma-rows').innerHTML = maHtml;

                // Pivots
                document.getElementById('pivot-rows').innerHTML = `
                <div class="row pivot-r"><span class="label">RES 2</span><span class="val neutral">$${piv.R2}</span></div>
                <div class="row pivot-r"><span class="label">RES 1</span><span class="val neutral">$${piv.R1}</span></div>
                <div class="row pivot-pp"><span class="label">PIVOT</span><span class="val" style="color:#fff">$${piv.PP}</span></div>
                <div class="row pivot-s"><span class="label">SUP 1</span><span class="val neutral">$${piv.S1}</span></div>
                <div class="row pivot-s"><span class="label">SUP 2</span><span class="val neutral">$${piv.S2}</span></div>
            `;

                // Fibs
                document.getElementById('fib-rows').innerHTML = [
                    ['1.000', fib['100']], ['0.618', fib['61.8']], ['0.500', fib['50']], ['0.382', fib['38.2']], ['0.000', fib['0']]
                ].map(([l, v]) => `<div class="row"><span class="label" style="color:#666">${l}</span><span class="val neutral">$${v}</span></div>`).join('');

                // Volume
                document.getElementById('vol-rows').innerHTML = `
                <div class="row"><span class="label">Relative Vol</span><span class="val" style="color:#fff">${vol.rel_vol}x</span></div>
                <div class="vol-bar-outer"><div class="vol-bar-inner" style="width:${vol.rel_vol_pct}%"></div></div>
                <div class="row" style="margin-top:8px"><span class="label">Current</span><span class="val neutral">${vol.current}</span></div>
                <div class="row"><span class="label">Avg (20D)</span><span class="val neutral">${vol.avg_20d}</span></div>
            `;

                // Oscillators
                document.getElementById('w-adx').textContent = osc.adx_14;
                document.getElementById('w-macd').textContent = osc.macd_hist;
                document.getElementById('w-stoch').textContent = osc.stoch_k;
                document.getElementById('w-hv30').textContent = (d.volatility?.hv_30d || 0).toFixed(1);
            }

            window.copyEmbed = function () {
                const url = `https://mphinance.github.io/mphinance/widgets/technical-matrix.html?t=${ticker}`;
                const code = `<iframe src="${url}" width="700" height="520" frameborder="0" style="border-radius:4px;overflow:hidden;"></iframe>`;
                navigator.clipboard.writeText(code).then(() => {
                    const btn = document.querySelector('.embed-btn');
                    btn.textContent = '✓ Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = '</> Embed'; btn.classList.remove('copied'); }, 2000);
                });
            };
        })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
    window.shareWidgetScreenshot = function(widgetSelector, ticker, widgetName, btn) {
        const original = btn.innerHTML;
        btn.innerHTML = '⏳ Capturing...';
        btn.classList.add('capturing');

        const el = document.querySelector(widgetSelector || '.widget');
        if (!el) { btn.innerHTML = original; return; }

        html2canvas(el, {
            backgroundColor: '#050508',
            scale: 2,
            useCORS: true,
            allowTaint: true,
            logging: false
        }).then(function(canvas) {
            canvas.toBlob(function(blob) {
                const filename = (ticker || 'ticker') + '-' + (widgetName || 'widget') + '.png';
                const file = new File([blob], filename, { type: 'image/png' });

                // Try Web Share API first (mobile native share sheet)
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        title: (ticker || '') + ' Alpha.HUD Widget',
                        text: 'Live trading data from Alpha.HUD — mphinance.github.io/mphinance/widgets/',
                        files: [file]
                    }).then(function() {
                        btn.innerHTML = '✓ Shared!';
                        btn.classList.remove('capturing');
                        btn.classList.add('done');
                        setTimeout(function() { btn.innerHTML = original; btn.classList.remove('done'); }, 2000);
                    }).catch(function() {
                        downloadImage(canvas, filename, btn, original);
                    });
                } else {
                    // Fallback: download
                    downloadImage(canvas, filename, btn, original);
                }
            }, 'image/png');
        }).catch(function(e) {
            console.error('html2canvas failed:', e);
            btn.innerHTML = original;
            btn.classList.remove('capturing');
        });
    };

    function downloadImage(canvas, filename, btn, original) {
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.innerHTML = '✓ Saved!';
        btn.classList.remove('capturing');
        btn.classList.add('done');
        setTimeout(function() { btn.innerHTML = original; btn.classList.remove('done'); }, 2000);
    }
    </script>
</body>

</html>
