<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuation Panel — Alpha.HUD Widget</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #050508;
            --panel: rgba(10, 10, 10, 0.9);
            --border: #333;
            --green: #00ff41;
            --red: #ff3e3e;
            --blue: #00f3ff;
            --amber: #ffb000;
            --text: #e0e0e0;
            --dim: #888;
            --muted: #555;
            --purple: #a855f7
        }

        body {
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            background-size: 100% 2px, 3px 100%
        }

        .widget {
            max-width: 340px;
            margin: 16px auto;
            border: 1px solid var(--border);
            border-top: 3px solid var(--border);
            background: var(--panel);
            overflow: hidden;
            text-align: center
        }

        .ticker-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid #1a1a1a;
            text-align: left
        }

        .ticker-bar img {
            width: 22px;
            height: 22px;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: #fff;
            padding: 1px;
            object-fit: contain
        }

        .ticker-bar .name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.06em
        }

        .ticker-bar .price {
            font-size: 0.85rem;
            color: var(--dim);
            margin-left: auto
        }

        .method {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 12px 16px 4px
        }

        .status {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 0.12em;
            padding: 4px 16px 8px
        }

        .glow-green {
            color: var(--green);
            text-shadow: 0 0 12px rgba(0, 255, 65, 0.4)
        }

        .glow-red {
            color: var(--red);
            text-shadow: 0 0 12px rgba(255, 62, 62, 0.4)
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border-top: 1px solid #1a1a1a;
            font-size: 9px
        }

        .detail-cell {
            padding: 10px;
            border-right: 1px solid #1a1a1a
        }

        .detail-cell:last-child {
            border-right: none
        }

        .detail-cell .dlabel {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2px
        }

        .detail-cell .dval {
            font-size: 13px;
            font-weight: 700;
            color: #ddd
        }

        .gap-bar {
            margin: 0 16px 12px;
            height: 6px;
            background: #1a1a1a;
            border-radius: 3px;
            position: relative;
            overflow: visible
        }

        .gap-marker {
            position: absolute;
            top: -3px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--panel)
        }

        .gap-label {
            font-size: 8px;
            color: var(--muted);
            text-align: center;
            margin-bottom: 8px
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid #1a1a1a
        }

        .footer .brand {
            font-size: 8px;
            color: #333;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none
        }

        .footer .brand:hover {
            color: var(--purple)
        }

        .embed-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            padding: 3px 10px;
            border: 1px solid #333;
            color: #555;
            background: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 2px;
            transition: all 0.2s
        }

        .embed-btn:hover {
            color: var(--blue);
            border-color: var(--blue)
        }

        .embed-btn.copied {
            color: #22c55e;
            border-color: #22c55e
        }
    </style>
</head>

<body>
    <div class="widget">
        <div class="ticker-bar">
            <img id="w-logo" src="" alt="">
            <span class="name" id="w-ticker">---</span>
            <span class="price" id="w-price">$---</span>
        </div>
        <div class="method" id="w-method">VALUATION (---)</div>
        <div class="status" id="w-status">---</div>
        <div class="gap-label" id="w-gap-label">---</div>
        <div class="gap-bar">
            <div class="gap-marker" id="w-marker"></div>
        </div>
        <div class="details">
            <div class="detail-cell">
                <div class="dlabel">Fair Value</div>
                <div class="dval" id="w-target">$---</div>
            </div>
            <div class="detail-cell">
                <div class="dlabel">Gap</div>
                <div class="dval" id="w-gap">---</div>
            </div>
        </div>
        <div class="footer">
            <a href="https://mphinance.github.io/mphinance/" class="brand" target="_blank">Alpha.HUD // mphinance</a>
            <button class="embed-btn" onclick="copyEmbed()">&lt;/&gt; Embed</button>
        </div>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            let ticker = params.get('t') || params.get('ticker') || 'TSLA';
            const base = window.location.href.includes('github.io')
                ? `https://mphinance.github.io/mphinance/ticker/${ticker}/latest.json`
                : `../ticker/${ticker}/latest.json`;

            fetch(base + '?t=' + Date.now()).then(r => r.json()).then(d => {
                document.getElementById('w-logo').src = d.logo_url || '';
                document.getElementById('w-ticker').textContent = d.ticker;
                document.getElementById('w-price').textContent = '$' + d.currentPrice;

                const v = d.valuation || {};
                document.getElementById('w-method').textContent = 'VALUATION (' + (v.method || 'N/A') + ')';

                const statusEl = document.getElementById('w-status');
                statusEl.textContent = v.status || 'N/A';
                const isUnder = (v.status || '').includes('UNDER');
                statusEl.className = 'status ' + (isUnder ? 'glow-green' : 'glow-red');

                document.getElementById('w-target').textContent = '$' + (v.target_price || 'N/A');

                const gap = v.gap_pct || 0;
                const gapEl = document.getElementById('w-gap');
                gapEl.textContent = (gap >= 0 ? '+' : '') + gap.toFixed(1) + '%';
                gapEl.style.color = isUnder ? 'var(--green)' : 'var(--red)';

                // Gap bar visualization
                const clipped = Math.max(-50, Math.min(50, gap));
                const pct = ((clipped + 50) / 100) * 100;
                const marker = document.getElementById('w-marker');
                marker.style.left = pct + '%';
                marker.style.background = isUnder ? 'var(--green)' : 'var(--red)';
                marker.style.boxShadow = isUnder ? '0 0 8px rgba(0,255,65,0.5)' : '0 0 8px rgba(255,62,62,0.5)';

                document.getElementById('w-gap-label').textContent = gap > 0 ? '↑ Price Above Fair Value' : gap < 0 ? '↓ Price Below Fair Value' : 'At Fair Value';
            }).catch(() => { document.getElementById('w-ticker').textContent = ticker + ' (no data)'; });

            window.copyEmbed = function () {
                const url = `https://mphinance.github.io/mphinance/widgets/valuation.html?t=${ticker}`;
                const code = `<iframe src="${url}" width="340" height="260" frameborder="0" style="border-radius:4px;overflow:hidden;"></iframe>`;
                navigator.clipboard.writeText(code).then(() => {
                    const btn = document.querySelector('.embed-btn'); btn.textContent = '✓ Copied!'; btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = '</> Embed'; btn.classList.remove('copied'); }, 2000);
                });
            };
        })();
    </script>
</body>

</html>
