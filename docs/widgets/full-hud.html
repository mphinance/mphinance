<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha.HUD — Full Dossier Widget</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden !important;
        }

        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #050508;
            --panel: rgba(10, 10, 10, 0.95);
            --border: #282838;
            --green: #00ff41;
            --red: #f0b400;
            --blue: #00f3ff;
            --amber: #ffb000;
            --purple: #a855f7;
            --text: #e0e0e0;
            --dim: #aaa;
            --muted: #666;
        }

        body {
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            font-size: 11px;
            background-image:
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.015), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
        }

        /* ── Layout ── */
        .hud {
            width: 100%;
        }

        /* ── Ticker Header ── */
        .ticker-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(5, 5, 10, 0.98);
            border-bottom: 2px solid var(--border);
        }

        .ticker-header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ticker-header img {
            width: 26px;
            height: 26px;
            border-radius: 3px;
            background: #fff;
            padding: 1px;
            object-fit: contain;
            border: 1px solid #333;
        }

        .ticker-header .symbol {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.08em;
        }

        .ticker-header .company {
            font-size: 9px;
            color: var(--dim);
            margin-top: 1px;
        }

        .ticker-header .right {
            text-align: right;
        }

        .ticker-header .price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
        }

        .ticker-header .chg {
            font-size: 10px;
            font-weight: 700;
        }

        .ticker-header .ts {
            font-size: 8px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── Signal Strip ── */
        .signal-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-bottom: 1px solid var(--border);
        }

        .sig-cell {
            background: rgba(8, 8, 12, 0.95);
            text-align: center;
            padding: 10px 6px;
        }

        .sig-cell .s-label {
            font-size: 8px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 4px;
        }

        .sig-cell .s-val {
            font-size: 1rem;
            font-weight: 800;
            font-family: 'Share Tech Mono', monospace;
        }

        .sig-cell .s-sub {
            font-size: 8px;
            color: var(--dim);
            margin-top: 2px;
        }

        /* ── Two-col body ── */
        .body-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            border-bottom: 1px solid var(--border);
        }

        .panel {
            background: rgba(8, 8, 12, 0.95);
            padding: 12px;
        }

        .panel-title {
            font-size: 8px;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        .panel-title.amber {
            color: var(--amber);
        }

        .panel-title.green {
            color: var(--green);
        }

        .panel-title.purple {
            color: var(--purple);
        }

        /* Valuation */
        .val-status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            padding: 6px 0;
        }

        .val-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 2px 0;
        }

        .val-row .lbl {
            color: var(--muted);
        }

        .val-row .v {
            font-weight: 700;
        }

        .gap-track {
            height: 5px;
            background: #1a1a1a;
            border-radius: 3px;
            margin: 6px 0;
            position: relative;
        }

        .gap-dot {
            position: absolute;
            top: -3px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 2px solid rgba(5, 5, 8, 0.8);
        }

        /* Scores */
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-bottom: 6px;
        }

        .score-box {
            background: #0a0a10;
            border: 1px solid #1a1a1a;
            text-align: center;
            padding: 8px 4px;
            border-radius: 2px;
        }

        .score-box .sc-label {
            font-size: 7px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .score-box .sc-val {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .grade-pill {
            display: inline-block;
            padding: 2px 10px;
            border: 1px solid var(--amber);
            color: var(--amber);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            white-space: nowrap;
            align-self: flex-start;
            margin-left: auto;
        }

        .ai-text {
            font-size: 10px;
            color: #bbb;
            line-height: 1.6;
        }

        /* Options */
        .opts-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            gap: 4px;
            margin-bottom: 6px;
        }

        .opts-cell .o-label {
            font-size: 8px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .opts-cell .o-val {
            font-size: 1rem;
            font-weight: 700;
        }

        .ratio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        .ratio-box {
            background: #0a0a10;
            border: 1px solid #1a1a1a;
            text-align: center;
            padding: 6px;
        }

        .ratio-box .rl {
            font-size: 7px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .ratio-box .rv {
            font-size: 1rem;
            font-weight: 800;
        }

        .pc-bar {
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            display: flex;
            overflow: hidden;
            margin: 6px 0;
        }

        .pc-calls {
            background: var(--green);
            height: 100%;
        }

        .pc-puts {
            background: var(--red);
            height: 100%;
        }

        /* MA column */
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            font-size: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-row .dl {
            color: var(--muted);
        }

        .data-row .dv {
            font-weight: 700;
        }

        .up {
            color: var(--green);
        }

        .down {
            color: var(--red);
        }

        .neutral {
            color: var(--dim);
        }

        .glow-green {
            color: var(--green);
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
        }

        .glow-red {
            color: var(--red);
            text-shadow: 0 0 8px rgba(240, 180, 0, 0.4);
        }

        .glow-blue {
            color: var(--blue);
        }

        .glow-amber {
            color: var(--amber);
        }

        /* Institutional */
        .inst-signal {
            padding: 6px 8px;
            border-radius: 2px;
            margin-bottom: 6px;
            font-size: 10px;
            border: 1px solid;
        }

        .inst-signal.buying {
            border-color: rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.04);
            color: var(--green);
        }

        .inst-signal.selling {
            border-color: rgba(240, 180, 0, 0.3);
            background: rgba(240, 180, 0, 0.04);
            color: var(--red);
        }

        .fund-row {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Footer */
        .hud-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 14px;
            background: rgba(5, 5, 8, 0.98);
            border-top: 1px solid var(--border);
        }

        .hud-footer .brand {
            font-size: 8px;
            color: #2a2a3a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
        }

        .hud-footer .brand:hover {
            color: var(--purple);
        }

        .footer-btns {
            display: flex;
            gap: 6px;
        }

        .f-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            padding: 3px 10px;
            border: 1px solid #2a2a3a;
            color: #555;
            background: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .f-btn:hover {
            color: var(--blue);
            border-color: var(--blue);
        }

        .f-btn.purple:hover {
            color: var(--purple);
            border-color: var(--purple);
        }

        .f-btn.copied,
        .f-btn.done {
            color: #22c55e;
            border-color: #22c55e;
        }

        .f-btn.capturing {
            color: var(--amber);
            border-color: var(--amber);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 11px;
        }

        .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }
    </style>
</head>

<body>
    <div class="hud" id="hud">
        <div class="loading">Loading<span class="blink">_</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const ticker = (params.get('t') || params.get('ticker') || 'TSLA').toUpperCase();
            const base = window.location.href.includes('github.io')
                ? `https://mphinance.github.io/mphinance/ticker/${ticker}/latest.json`
                : `../ticker/${ticker}/latest.json`;

            function fmt(n) { return n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1000 ? (n / 1000).toFixed(0) + 'K' : (n || 0).toLocaleString(); }
            function sign(n) { return (n >= 0 ? '+' : '') + (parseFloat(n) || 0).toFixed(2); }
            function $$(sel) { return document.querySelectorAll(sel); }

            fetch(base + '?t=' + Date.now())
                .then(r => r.json())
                .then(d => {
                    document.getElementById('hud').innerHTML = buildHUD(d);
                    document.title = d.ticker + ' — Alpha.HUD';
                })
                .catch(() => {
                    document.getElementById('hud').innerHTML = '<div class="loading">No data for ' + ticker + '</div>';
                });

            function buildHUD(d) {
                const ta = d.technical_analysis || {};
                const ema = ta.ema || {};
                const trend = ta.trend || {};
                const piv = ta.pivots || {};
                const osc = ta.oscillators || {};
                const vol = ta.volume || {};
                const vs = d.volumeStats || {};
                const v = d.valuation || {};
                const sc = d.scores || {};
                const tt = d.tickertrace || {};
                const sig = tt.signal || null;
                const holdings = (tt.detail || {}).holdings || [];
                const price = d.currentPrice || 0;
                const chg = d.priceChangePct || 0;
                const isUp = chg >= 0;
                const isUnder = (v.status || '').includes('UNDER');
                const stack = (ta.ema_stack || 'N/A');
                const rsi = parseFloat(osc.rsi_14) || 50;

                // EMA stack color
                let emaClass = 'glow-amber';
                if (stack.includes('BULL')) emaClass = 'glow-green';
                else if (stack.includes('BEAR')) emaClass = 'glow-red';

                // Valuation gap bar
                const gap = v.gap_pct || 0;
                const gapClipped = Math.max(-60, Math.min(60, gap));
                const gapPct = ((gapClipped + 60) / 120 * 100).toFixed(1);

                // Options bar
                const totalVol = (vs.callVolume || 0) + (vs.putVolume || 0);
                const callPct = totalVol > 0 ? ((vs.callVolume || 0) / totalVol * 100).toFixed(1) : 50;

                // Institutional signal
                let instHTML = '<div class="neutral" style="font-size:9px;font-style:italic">No signal data</div>';
                if (sig) {
                    const isBuying = (sig.direction || '').toLowerCase().includes('buy');
                    instHTML = `<div class="inst-signal ${isBuying ? 'buying' : 'selling'}">
                    <strong style="text-transform:uppercase">${sig.direction}</strong>
                    <span style="color:var(--dim);font-size:9px;margin-left:6px">Conv: ${sig.conviction ? sig.conviction.toFixed(1) : 'N/A'}</span>
                </div>`;
                }
                const fundRows = holdings.slice(0, 5).map(f =>
                    `<div class="fund-row"><span style="color:var(--dim)">${f.fund}</span><span style="color:#aaa">${f.weight ? f.weight.toFixed(2) + '%' : '—'}</span></div>`
                ).join('');

                // AI text — strip HTML tags for cleaner look
                const aiRaw = (d.ai_analysis || 'No analysis').replace(/<br\s*\/?>/gi, ' ').replace(/<[^>]+>/g, '').slice(0, 220);

                // MA rows (price vs each EMA)
                const maRows = [
                    ['EMA 8', ema['8']], ['EMA 21', ema['21']], ['EMA 34', ema['34']], ['EMA 55', ema['55']], ['EMA 89', ema['89']],
                    ['SMA 50', trend.sma_50], ['SMA 200', trend.sma_200]
                ].map(([l, val]) => {
                    if (!val) return '';
                    const cls = price > parseFloat(val) ? 'up' : 'down';
                    return `<div class="data-row"><span class="dl">${l}</span><span class="dv ${cls}">$${val}</span></div>`;
                }).join('');

                return `
            <div class="ticker-header">
                <div class="left">
                    <img src="${d.logo_url || ''}" alt="" onerror="this.style.display='none'">
                    <div>
                        <div class="symbol">${d.ticker}</div>
                        <div class="company">${d.companyName || ''} &bull; ${d.sector || ''}</div>
                    </div>
                </div>
                <div class="right">
                    <div class="price">$${price}</div>
                    <div class="chg ${isUp ? 'glow-green' : 'glow-red'}">${sign(chg)}%</div>
                    <div class="ts">${d.generated_at || ''}</div>
                </div>
            </div>

            <div class="signal-strip">
                <div class="sig-cell">
                    <div class="s-label">Trend</div>
                    <div class="s-val ${(d.trendOverall || '').includes('Bullish') ? 'glow-green' : 'glow-red'}">${d.trendOverall || '—'}</div>
                    <div class="s-sub">${trend.crossover || ''}</div>
                </div>
                <div class="sig-cell">
                    <div class="s-label">RSI (14)</div>
                    <div class="s-val" style="color:${rsi > 70 ? 'var(--red)' : rsi < 30 ? 'var(--green)' : '#fff'}">${rsi.toFixed(1)}</div>
                    <div class="s-sub">${rsi > 70 ? 'Overbought' : rsi < 30 ? 'Oversold' : 'Neutral'}</div>
                </div>
                <div class="sig-cell">
                    <div class="s-label">IV / HV</div>
                    <div class="s-val glow-blue">${(d.impliedVolatility || 0).toFixed(1)}%</div>
                    <div class="s-sub">HV: ${(d.historicVolatility || 0).toFixed(1)}%</div>
                </div>
                <div class="sig-cell">
                    <div class="s-label">EMA Stack</div>
                    <div class="s-val ${emaClass}">${stack.replace('PARTIAL ', 'P.')}</div>
                    <div class="s-sub">Grade: <strong style="color:var(--amber)">${sc.grade || '—'}</strong></div>
                </div>
            </div>

            <div class="body-grid">
                <!-- Valuation -->
                <div class="panel">
                    <div class="panel-title amber">Valuation // ${v.method || 'N/A'}</div>
                    <div class="val-status ${isUnder ? 'glow-green' : 'glow-red'}">${v.status || 'N/A'}</div>
                    <div class="gap-track">
                        <div class="gap-dot" style="left:${gapPct}%;background:${isUnder ? 'var(--green)' : 'var(--red)'};box-shadow:0 0 6px ${isUnder ? 'rgba(0,255,65,0.5)' : 'rgba(240,180,0,0.5)'}"></div>
                    </div>
                    <div class="val-row"><span class="lbl">Fair Value</span><span class="v">$${v.target_price || '—'}</span></div>
                    <div class="val-row"><span class="lbl">Gap</span><span class="v ${isUnder ? 'up' : 'down'}">${gap >= 0 ? '+' : ''}${gap.toFixed(1)}%</span></div>
                    <div class="val-row"><span class="lbl">Market Cap</span><span class="v neutral">${(d.market_snapshot || {}).market_cap || '—'}</span></div>
                    <div class="val-row"><span class="lbl">Analyst Tgt</span><span class="v neutral">$${(d.market_snapshot || {}).analyst_target || '—'}</span></div>
                </div>

                <!-- AI Synthesis -->
                <div class="panel">
                    <div class="panel-title purple">AI.Synthesis <span class="blink" style="color:var(--purple)">_</span></div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                        <div class="score-grid" style="flex:1;margin-right:8px">
                            <div class="score-box">
                                <div class="sc-label">Tech</div>
                                <div class="sc-val" style="color:${(sc.technical || 0) > 60 ? 'var(--green)' : 'var(--red)'}">${sc.technical || '—'}</div>
                            </div>
                            <div class="score-box">
                                <div class="sc-label">Fund</div>
                                <div class="sc-val" style="color:${(sc.fundamental || 0) > 60 ? 'var(--green)' : 'var(--red)'}">${sc.fundamental || '—'}</div>
                            </div>
                        </div>
                        <span class="grade-pill">${sc.grade || '—'}</span>
                    </div>
                    <div class="ai-text">${aiRaw}</div>
                </div>

                <!-- Options Flow -->
                <div class="panel">
                    <div class="panel-title glow-blue" style="color:var(--blue)">Options.Flow</div>
                    <div class="opts-row">
                        <div class="opts-cell"><div class="o-label">Calls</div><div class="o-val up">${fmt(vs.callVolume || 0)}</div></div>
                        <div class="opts-cell"><div class="o-label">Puts</div><div class="o-val down">${fmt(vs.putVolume || 0)}</div></div>
                        <div class="opts-cell"><div class="o-label">Total</div><div class="o-val neutral">${fmt(vs.totalVolume || 0)}</div></div>
                    </div>
                    <div class="pc-bar">
                        <div class="pc-calls" style="width:${callPct}%"></div>
                        <div class="pc-puts" style="width:${100 - parseFloat(callPct)}%"></div>
                    </div>
                    <div class="ratio-grid">
                        <div class="ratio-box"><div class="rl">P/C Vol</div><div class="rv" style="color:${(vs.pcRatioVol || 0) > 1 ? 'var(--red)' : 'var(--green)'}">${vs.pcRatioVol || '—'}</div></div>
                        <div class="ratio-box"><div class="rl">P/C OI</div><div class="rv" style="color:${(vs.pcRatioOi || 0) > 1 ? 'var(--red)' : 'var(--green)'}">${vs.pcRatioOi || '—'}</div></div>
                    </div>
                </div>

                <!-- Institutional -->
                <div class="panel">
                    <div class="panel-title green">Institutional.Intel</div>
                    ${instHTML}
                    ${fundRows || '<div class="neutral" style="font-size:9px;font-style:italic">No holdings data</div>'}
                </div>

                <!-- Technical MAs (full width) -->
                <div class="panel" style="border-top:1px solid var(--border)">
                    <div class="panel-title">Moving Averages</div>
                    ${maRows}
                </div>

                <!-- Pivots -->
                <div class="panel" style="border-top:1px solid var(--border)">
                    <div class="panel-title amber">Pivots + Oscillators</div>
                    <div class="data-row"><span class="dl">R2</span><span class="dv neutral">$${piv.R2 || '—'}</span></div>
                    <div class="data-row"><span class="dl">R1</span><span class="dv neutral">$${piv.R1 || '—'}</span></div>
                    <div class="data-row" style="background:rgba(255,255,255,0.03);"><span class="dl">PP</span><span class="dv" style="color:#fff">$${piv.PP || '—'}</span></div>
                    <div class="data-row"><span class="dl">S1</span><span class="dv neutral">$${piv.S1 || '—'}</span></div>
                    <div class="data-row"><span class="dl">S2</span><span class="dv neutral">$${piv.S2 || '—'}</span></div>
                    <div class="data-row" style="margin-top:6px"><span class="dl">ADX</span><span class="dv neutral">${osc.adx_14 || '—'}</span></div>
                    <div class="data-row"><span class="dl">MACD Hist</span><span class="dv neutral">${osc.macd_hist || '—'}</span></div>
                    <div class="data-row"><span class="dl">Stoch %K</span><span class="dv neutral">${osc.stoch_k || '—'}</span></div>
                    <div class="data-row"><span class="dl">Rel. Vol</span><span class="dv neutral">${vol.rel_vol || '—'}x</span></div>
                </div>
            </div>

            <div class="hud-footer">
                <a href="https://mphinance.github.io/mphinance/" class="brand" target="_blank">Alpha.HUD // mphinance</a>
                <div class="footer-btns">
                    <button class="f-btn purple" onclick="screenshotHUD('${ticker}', this)">📷 Share</button>
                    <button class="f-btn" onclick="copyEmbed('${ticker}', this)">&lt;/&gt; Embed</button>
                </div>
            </div>
            `;
            }

            window.copyEmbed = function (t, btn) {
                const url = `https://mphinance.github.io/mphinance/widgets/full-hud.html?t=${t}`;
                const code = `<iframe src="${url}" width="700" height="760" frameborder="0" style="border-radius:6px;overflow:hidden;"></iframe>`;
                navigator.clipboard.writeText(code).then(() => {
                    btn.textContent = '✓ Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = '</> Embed'; btn.classList.remove('copied'); }, 2000);
                });
            };

            window.screenshotHUD = function (t, btn) {
                const original = btn.innerHTML;
                btn.innerHTML = '⏳ Capturing...';
                btn.classList.add('capturing');
                const el = document.getElementById('hud');
                html2canvas(el, { backgroundColor: '#050508', scale: 2, useCORS: true, logging: false }).then(canvas => {
                    canvas.toBlob(blob => {
                        const file = new File([blob], `${t}-alpha-hud.png`, { type: 'image/png' });
                        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                            navigator.share({
                                title: t + ' Alpha.HUD',
                                text: 'Live trading HUD — mphinance.github.io/mphinance/widgets/',
                                files: [file]
                            }).then(() => done()).catch(() => dl(canvas, t, btn, original));
                        } else { dl(canvas, t, btn, original); }
                    }, 'image/png');
                }).catch(() => { btn.innerHTML = original; btn.classList.remove('capturing'); });

                function done() { btn.innerHTML = '✓ Shared!'; btn.classList.remove('capturing'); btn.classList.add('done'); setTimeout(() => { btn.innerHTML = original; btn.classList.remove('done'); }, 2000); }
                function dl(c, t, btn, orig) {
                    const a = document.createElement('a'); a.download = t + '-alpha-hud.png'; a.href = c.toDataURL('image/png'); a.click();
                    btn.innerHTML = '✓ Saved!'; btn.classList.remove('capturing'); btn.classList.add('done'); setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('done'); }, 2000);
                }
            };
        })();
    </script>
</body>

</html>
