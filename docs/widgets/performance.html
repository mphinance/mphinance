<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy Performance — Alpha.HUD</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KTHVTFX699"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-KTHVTFX699');</script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#050508;--panel:rgba(14,14,22,0.95);--border:#2a2a35;--green:#00ff41;--red:#f0b400;--danger:#e53935;--blue:#00f3ff;--amber:#ffb000;--purple:#a855f7;--text:#e0e0e0;--dim:#aaa;--muted:#777}
        body{background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);background-image:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.25) 50%),linear-gradient(90deg,rgba(255,0,0,0.04),rgba(0,255,0,0.02),rgba(0,0,255,0.04));background-size:100% 2px,3px 100%;min-height:100vh;padding:16px}
        .dashboard{max-width:800px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:4px 4px 0 0;margin-bottom:2px}
        .header h1{font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:#fff;letter-spacing:0.08em}
        .header .meta{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
        .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:2px}
        .summary-cell{background:var(--panel);text-align:center;padding:14px 8px;border:1px solid var(--border)}
        .summary-cell .label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:4px}
        .summary-cell .value{font-size:1.4rem;font-weight:800;font-family:'Share Tech Mono',monospace}
        .summary-cell .sub{font-size:8px;color:var(--dim);margin-top:3px}

        .section{margin-top:2px;background:var(--panel);border:1px solid var(--border);padding:16px}
        .section h2{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #1a1a2a}

        .strat-row{display:grid;grid-template-columns:2fr 0.5fr 0.8fr 0.8fr 0.5fr;gap:4px;padding:8px 4px;border-bottom:1px solid #111;align-items:center;transition:background 0.2s}
        .strat-row:hover{background:rgba(0,243,255,0.03)}
        .strat-row:last-child{border-bottom:none}
        .strat-name{font-size:0.7rem;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .strat-val{font-size:0.8rem;font-weight:700;text-align:right;font-family:'Share Tech Mono',monospace}
        .strat-bar-wrap{height:6px;background:#111;border-radius:3px;overflow:hidden;position:relative}
        .strat-bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease}

        .grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
        .grade-card{background:rgba(10,10,18,0.6);border:1px solid #1a1a2a;border-radius:4px;padding:12px;text-align:center;transition:border-color 0.3s}
        .grade-card:hover{border-color:var(--blue)}
        .grade-letter{font-size:1.8rem;font-weight:800;font-family:'Share Tech Mono',monospace;margin-bottom:4px}
        .grade-stat{font-size:9px;color:var(--dim);margin-top:2px}
        .grade-wr{font-size:1rem;font-weight:700;font-family:'Share Tech Mono',monospace}

        .ema-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #111}
        .ema-row:last-child{border-bottom:none}
        .ema-label{font-size:0.7rem}
        .ema-stats{display:flex;gap:16px}
        .ema-stat{font-size:0.75rem;font-weight:700;font-family:'Share Tech Mono',monospace}

        .footer{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(10,10,10,0.8);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px}
        .footer .brand{font-size:8px;color:#333;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none}
        .footer .brand:hover{color:var(--purple)}
        .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite;margin-right:6px}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

        .glow-green{color:var(--green);text-shadow:0 0 8px rgba(0,255,65,0.4)}
        .glow-red{color:var(--red);text-shadow:0 0 8px rgba(240,180,0,0.4)}
        .glow-danger{color:var(--danger);text-shadow:0 0 8px rgba(229,57,53,0.4)}
        .glow-blue{color:var(--blue);text-shadow:0 0 8px rgba(0,243,255,0.4)}
        .glow-amber{color:var(--amber);text-shadow:0 0 8px rgba(255,176,0,0.4)}

        @media(max-width:600px){
            .summary-grid{grid-template-columns:repeat(2,1fr)}
            .strat-row{grid-template-columns:1.5fr 0.5fr 0.8fr 0.8fr;font-size:0.65rem}
            .grade-grid{grid-template-columns:repeat(2,1fr)}
        }
    </style>
</head>
<body>
    <div class="dashboard" id="perf-dash">
        <div class="header">
            <h1>📊 STRATEGY PERFORMANCE</h1>
            <div class="meta"><span class="pulse"></span>LIVE TRACKING</div>
        </div>
        <div class="summary-grid" id="summary"></div>
        <div class="section" id="strategies-section">
            <h2>Screen Performance (5-Day Forward Returns)</h2>
            <div id="strategies"></div>
        </div>
        <div class="section" id="grades-section">
            <h2>Grade Heatmap</h2>
            <div class="grade-grid" id="grades"></div>
        </div>
        <div class="section" id="ema-section">
            <h2>EMA Stack Analysis</h2>
            <div id="ema-stacks"></div>
        </div>
        <div class="footer">
            <a href="https://mphinance.github.io/mphinance/" class="brand" target="_blank">Alpha.HUD // Ghost Alpha Backtesting</a>
            <span style="font-size:8px;color:#333" id="gen-time">—</span>
        </div>
    </div>

    <script>
    (function() {
        const base = window.location.href.includes('github.io')
            ? 'https://mphinance.github.io/mphinance/api/backtest-stats.json'
            : '../api/backtest-stats.json';

        fetch(base + '?t=' + Date.now())
            .then(r => r.json())
            .then(d => render(d))
            .catch(e => {
                document.getElementById('summary').innerHTML =
                    '<div class="summary-cell" style="grid-column:1/-1"><div class="value glow-red">NO DATA</div><div class="sub">Run the pipeline to generate stats</div></div>';
            });

        function wrColor(wr) {
            if (wr >= 60) return 'glow-green';
            if (wr >= 45) return 'glow-amber';
            if (wr >= 30) return 'glow-red';
            return 'glow-danger';
        }

        function retColor(ret) {
            if (ret > 2) return 'glow-green';
            if (ret > 0) return 'glow-blue';
            if (ret > -3) return 'glow-red';
            return 'glow-danger';
        }

        function render(d) {
            // Summary cards
            const totalPicks = d.validated_entries || 0;
            const allReturns = d.strategies.map(s => s.avg_5d);
            const bestStrat = d.strategies.reduce((a, b) => a.win_rate > b.win_rate ? a : b, d.strategies[0]);
            const avgWR = d.strategies.reduce((s, x) => s + x.win_rate, 0) / d.strategies.length;

            document.getElementById('summary').innerHTML = `
                <div class="summary-cell">
                    <div class="label">Tracked Picks</div>
                    <div class="value glow-blue">${totalPicks}</div>
                    <div class="sub">${d.total_entries} total logged</div>
                </div>
                <div class="summary-cell">
                    <div class="label">Screens Active</div>
                    <div class="value glow-green">${d.strategies.length}</div>
                    <div class="sub">TradingView + Finviz</div>
                </div>
                <div class="summary-cell">
                    <div class="label">Best Screen WR</div>
                    <div class="value ${wrColor(bestStrat.win_rate)}">${bestStrat.win_rate.toFixed(0)}%</div>
                    <div class="sub">${bestStrat.name.replace('Finviz: ', '')}</div>
                </div>
                <div class="summary-cell">
                    <div class="label">Avg Win Rate</div>
                    <div class="value ${wrColor(avgWR)}">${avgWR.toFixed(0)}%</div>
                    <div class="sub">across all screens</div>
                </div>`;

            // Strategy rows
            let stratHtml = '';
            // Sort by win rate desc
            const sorted = [...d.strategies].sort((a, b) => b.win_rate - a.win_rate);
            for (const s of sorted) {
                const name = s.name.replace('Finviz: ', '🔎 ');
                stratHtml += `
                <div class="strat-row">
                    <div class="strat-name">${name}</div>
                    <div class="strat-val" style="color:var(--dim)">${s.picks}</div>
                    <div>
                        <div class="strat-val ${retColor(s.avg_5d)}">${s.avg_5d > 0 ? '+' : ''}${s.avg_5d.toFixed(1)}%</div>
                        <div class="strat-bar-wrap">
                            <div class="strat-bar-fill" style="width:${Math.min(100, Math.abs(s.avg_5d) * 5)}%;background:${s.avg_5d >= 0 ? 'var(--green)' : 'var(--danger)'}"></div>
                        </div>
                    </div>
                    <div class="strat-val ${wrColor(s.win_rate)}">${s.win_rate.toFixed(0)}% WR</div>
                    <div class="strat-val" style="color:var(--dim);font-size:0.65rem">${s.best > 0 ? '+' : ''}${s.best.toFixed(0)}%</div>
                </div>`;
            }
            document.getElementById('strategies').innerHTML = stratHtml;

            // Grade heatmap
            const gradeOrder = ['A', 'B', 'C', 'D', 'BACKFILL'];
            let gradeHtml = '';
            for (const [g, v] of Object.entries(d.grades).sort((a,b) => {
                const order = {'A':0,'B':1,'C':2,'D':3,'BACKFILL':4};
                return (order[a[0]]||5) - (order[b[0]]||5);
            })) {
                const letterColor = v.win_rate >= 60 ? 'glow-green' : v.win_rate >= 40 ? 'glow-amber' : 'glow-danger';
                gradeHtml += `
                <div class="grade-card">
                    <div class="grade-letter ${letterColor}">${g}</div>
                    <div class="grade-wr ${wrColor(v.win_rate)}">${v.win_rate.toFixed(0)}% WR</div>
                    <div class="grade-stat">${v.picks} picks · ${v.avg_5d > 0 ? '+' : ''}${v.avg_5d.toFixed(1)}% avg</div>
                </div>`;
            }
            document.getElementById('grades').innerHTML = gradeHtml;

            // EMA stacks
            let emaHtml = '';
            for (const [stack, v] of Object.entries(d.ema_stacks)) {
                if (stack === 'Unknown' || !v.picks) continue;
                emaHtml += `
                <div class="ema-row">
                    <div class="ema-label">${stack}</div>
                    <div class="ema-stats">
                        <div class="ema-stat" style="color:var(--dim)">${v.picks} picks</div>
                        <div class="ema-stat ${retColor(v.avg_5d)}">${v.avg_5d > 0 ? '+' : ''}${v.avg_5d.toFixed(1)}%</div>
                        <div class="ema-stat ${wrColor(v.win_rate)}">${v.win_rate.toFixed(0)}% WR</div>
                    </div>
                </div>`;
            }
            if (!emaHtml) emaHtml = '<div class="ema-row"><div class="ema-label" style="color:var(--muted)">EMA data available after Ghost Alpha picks mature</div></div>';
            document.getElementById('ema-stacks').innerHTML = emaHtml;

            // Generation time
            if (d.generated) {
                const dt = new Date(d.generated);
                document.getElementById('gen-time').textContent = 'Updated: ' + dt.toLocaleDateString() + ' ' + dt.toLocaleTimeString();
            }
        }
    })();
    </script>
</body>
</html>
